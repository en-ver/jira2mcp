name: Publish to PyPI

on:
  push:
    tags:
      - "jira2mcp-v*"
      - "jira2cli-v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

# Restrict default permissions to read-only for all jobs
# Individual jobs explicitly escalate only what they need
permissions:
  contents: read

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.tag.outputs.package }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - id: tag
        name: Validate tag and export package metadata
        run: |
          TAG="${GITHUB_REF_NAME}"
          uv run --frozen python scripts/bump_version.py --validate-tag "$TAG"
          PACKAGE="${TAG%-v*}"
          VERSION="${TAG##*-v}"
          echo "package=${PACKAGE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify tag is on main branch
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag must be on the main branch"
            exit 1
          fi

      - name: Verify package release requirements
        env:
          PACKAGE: ${{ steps.tag.outputs.package }}
        run: |
          uv run --frozen python scripts/bump_version.py \
            --package "${PACKAGE}" \
            --validate-release

  check:
    name: Lint, type-check, and test
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-packages --group dev

      - name: Ruff lint
        run: uv run --locked ruff check packages/jira2mcp/src packages/jira2cli/src scripts tests

      - name: Ruff format
        run: uv run --locked ruff format --check packages/jira2mcp/src packages/jira2cli/src scripts tests

      - name: Type check
        run: uv run --locked ty check packages/jira2mcp/src/ packages/jira2cli/src/ scripts/

      - name: Test
        run: uv run --locked python -m pytest -m "not mcp_live"

  build:
    name: Build package
    needs: [validate-tag, check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Build tagged package
        env:
          PACKAGE: ${{ needs.validate-tag.outputs.package }}
        run: uv build --package "${PACKAGE}"

      - name: Upload package build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ needs.validate-tag.outputs.package }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: [validate-tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.validate-tag.outputs.package }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ needs.validate-tag.outputs.package }} v${{ needs.validate-tag.outputs.version }}
          generate_release_notes: true
          files: dist/*

  publish:
    name: Publish to PyPI
    needs: [validate-tag, build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ needs.validate-tag.outputs.package }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.validate-tag.outputs.package }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          packages-dir: dist/
