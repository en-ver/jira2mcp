[project]
name = "jira2mcp"
version = "0.1.4"
description = "MCP server exposing Jira Cloud tools via FastMCP"
readme = "README.md"
authors = [
    { name = "en-ver" }
]
requires-python = ">=3.13"
dependencies = [
    "fastmcp>=3.1.0",
    "jira2ai-core==0.2.2",
    "jira2py==0.6.0",
    "pydantic>=2.12.5",
]

[tool.uv.sources]
jira2ai-core = { workspace = true }

[project.scripts]
jira2mcp = "jira2mcp:main"

[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"
