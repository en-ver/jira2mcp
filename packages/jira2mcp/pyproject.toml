[project]
name = "jira2mcp"
version = "0.1.4"
description = "MCP server exposing Jira Cloud tools via FastMCP"
readme = "README.md"
authors = [
    { name = "en-ver" }
]
requires-python = ">=3.13"
dependencies = [
    "fastmcp>=3.1.0",
    "httpx>=0.28.1",
    "jira2py==0.7.0",
    "marklassian>=0.1.0",
    "pyadf>=0.3.0",
    "pydantic>=2.12.5",
]

[project.scripts]
jira2mcp = "jira2mcp:main"

[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"
