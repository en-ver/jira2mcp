[project]
name = "jira2ai-core"
version = "0.1.0"
description = "Shared core package for Jira AI integrations"
readme = "README.md"
authors = [
    { name = "en-ver" }
]
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.28.1",
    "jira2py==0.5.0",
    "marklassian>=0.1.0",
    "pathvalidate>=3.3.1",
    "pydantic>=2.12.5",
    "pyadf>=0.3.0",
]

[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"
