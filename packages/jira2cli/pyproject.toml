[project]
name = "jira2cli"
version = "0.1.5"
description = "CLI for Jira AI integrations powered by jira2py helpers"
readme = "README.md"
authors = [
    { name = "en-ver" }
]
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.28.1",
    "jira2py==0.8.0",
    "typer>=0.16.0",
]

[project.scripts]
jira2cli = "jira2cli:main"

[build-system]
requires = ["uv_build>=0.10.4,<0.12"]
build-backend = "uv_build"
